<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Favorite Person ❤️</title>
<style>
body {
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 40px;
    color: #fff;
    overflow-x: hidden;
}

.card {
    background: rgba(255,255,255,0.15);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    max-width: 500px;
    margin: auto;
    position: relative;
    z-index: 1;
}

h1 {
    font-size: 28px;
}

#text {
    font-size: 18px;
    min-height: 120px;
    margin-top: 20px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    font-weight: bold;
    cursor: pointer;
}

.heart {
    font-size: 35px;
    margin-top: 15px;
}

/* Floating emojis */
#floating-emojis {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}
</style>
</head>
<body>

<div class="card">
    <h1>HIIII ANUKU MA 😌❤️</h1>

    <div id="text"></div>

    <button id="nextBtn" onclick="nextMessage()">SLAP ME 👀</button>
    <button id="loveButton" onclick="showLove()" style="display:none;">Click to know how much I love you ❤️</button>
    <button id="playBGM" onclick="document.getElementById('bgm').play(); this.style.display='none';" style="display:none;">🎵 Play My Love BGM</button>

    <div class="heart">💖</div>
</div>

<!-- Audio for BGM (auto play) -->
<audio id="bgm" loop>
    <source src="Dude-Metro-Proposal-BGM.mp3" type="audio/mp3">
</audio>

<!-- Floating emojis container -->
<div id="floating-emojis"></div>

<script>
// Step 1: SLAP ME messages
const messages = [
    "First of all... Why are you urr or yen neega thinking too much? 😒🤍",
    "Do you really think I’ll leave you halfway? 😤",
    "I didn’t come into your life for time pass naa iruken ma😌...",
    "I came to stay with you forever and always. 🤍",
    "Distance is there... but my love for you? Zero distance 😌",
    "Even if you push me away...",
    "I’ll still come back and annoy you and eppavume ill keep loving you 😏🤍",
    "Because you are my love enda ellame neega thaa ma . 🫶",
    "So stop being scared or naa enga ill leave you or itha bond break agirum nu ellam dont think okay? en pannalum i wont leave you you will be happy with me i pinky promise you🤍🤍🤍🤍🤍🤍 ",
    "You’re stuck with me forever 😌💍"
];

let i = 0;
function nextMessage() {
    if (i < messages.length) {
        document.getElementById("text").innerHTML = messages[i];
        i++;
    } 
    if (i === messages.length) {
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("loveButton").style.display = "inline-block";
        document.getElementById("playBGM").style.display = "inline-block";
    }
}

// Step 2: Show love messages after button click
function showLove() {
    const loveText = `
        I love you more than words can express... 💖<br>
        Even distance cannot reduce my love for you athu ma like en nandathalum ma pathukalam i dont leave you i know neega upset ah iruthalum ma you wont say but i know athukunu i wont leave you bcz neega eanke rombave important i dont have words to say but i can say you something that naa eppavume here for you i want to spend my life with youi love you 😌<br>
        You are my everything, my heart, my soul… 🫶<br>
        Forever yours 💍<br>
        You make me smile every single day 😁❤️
    `;
    document.getElementById("text").innerHTML = loveText;
    document.getElementById("loveButton").style.display = "none";
}

// Floating emojis effect
const emojiList = ["💖","❤️","🥰","😍","💍","🫶","😌"];
function createEmoji() {
    const emoji = document.createElement("div");
    emoji.innerText = emojiList[Math.floor(Math.random()*emojiList.length)];
    emoji.style.position = "absolute";
    emoji.style.fontSize = (20 + Math.random()*30) + "px";
    emoji.style.left = Math.random()*100 + "%";
    emoji.style.top = "-5%";
    emoji.style.opacity = Math.random()*0.8 + 0.2;
    emoji.style.transition = "top 5s linear, opacity 5s linear";
    document.getElementById("floating-emojis").appendChild(emoji);

    setTimeout(() => {
        emoji.style.top = "110%";
        emoji.style.opacity = 0;
    }, 50);

    setTimeout(() => {
        emoji.remove();
    }, 5050);
}

// Create floating emojis every 500ms
setInterval(createEmoji, 500);
</script>

</body>
</html>
